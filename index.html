<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#1B2430" />
<title>Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #FAF7F2;
    color: #1B2430;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding-bottom: 100px;
    min-height: 100vh;
  }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .tap:active { transform: scale(0.97); }
  ::selection { background: #3A6B52; color: white; }
  input:focus, button:focus-visible {
    outline: 2px solid #3A6B52;
    outline-offset: 2px;
  }
  button { font-family: inherit; }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }

  .header { padding: 28px 20px 8px; }
  .header-row { display: flex; align-items: baseline; justify-content: space-between; }
  .title { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  .month-label { font-size: 12px; color: #8A8378; letter-spacing: 0.02em; }

  .hero-wrap { padding: 8px 20px 0; }
  .hero {
    background: #1B2430;
    border-radius: 18px;
    padding: 22px 20px;
    color: #FAF7F2;
    position: relative;
    overflow: hidden;
  }
  .hero-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: #A8A296; margin-bottom: 6px; font-weight: 600;
  }
  .hero-amount { font-size: 38px; font-weight: 700; line-height: 1; }
  .hero-amount.over { color: #E08A7D; }
  .hero-amount.under { color: #FAF7F2; }

  .progress-row {
    display: flex; justify-content: space-between; font-size: 11px;
    color: #A8A296; margin-bottom: 6px;
  }
  .budget-link {
    background: none; border: none; color: #A8A296; cursor: pointer;
    padding: 0; font-size: 11px; text-decoration: underline;
  }
  .progress-track {
    height: 8px; background: rgba(255,255,255,0.12); border-radius: 999px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; border-radius: 999px; transition: width 0.4s ease;
  }

  .strip { display: flex; gap: 10px; margin-top: 10px; }
  .strip-card {
    flex: 1; background: white; border: 1px solid #EAE4D8; border-radius: 14px; padding: 12px 14px;
  }
  .strip-head { display: flex; align-items: center; gap: 6px; }
  .strip-head-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .strip-amount { font-size: 18px; font-weight: 700; margin-top: 2px; }

  .section { padding: 20px 20px 0; }
  .section-label {
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; color: #8A8378; margin-bottom: 10px;
  }

  .cat-row { margin-bottom: 10px; }
  .cat-row-top { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 4px; }
  .cat-name { font-weight: 500; }
  .cat-amount { color: #5B5650; }
  .cat-track { height: 6px; background: #EFEAE0; border-radius: 999px; overflow: hidden; }
  .cat-fill { height: 100%; border-radius: 999px; transition: width 0.4s ease; }

  .empty-state {
    border: 1px dashed #D8D1C2; border-radius: 14px; padding: 28px 16px;
    text-align: center; color: #8A8378; font-size: 14px;
  }

  .ledger-card {
    background: white; border: 1px solid #EAE4D8; border-radius: 14px; overflow: hidden;
  }
  .ledger-row {
    display: flex; align-items: center; gap: 12px; padding: 12px 14px;
    border-top: 1px dashed #EAE4D8;
  }
  .ledger-row:first-child { border-top: none; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .ledger-mid { flex: 1; min-width: 0; }
  .ledger-note {
    font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ledger-sub { font-size: 11px; color: #8A8378; margin-top: 1px; }
  .ledger-amount { font-size: 14px; font-weight: 600; flex-shrink: 0; }
  .ledger-amount.income { color: #3A6B52; }
  .del-btn {
    background: none; border: none; color: #C7C0B2; cursor: pointer; padding: 4px; flex-shrink: 0;
    display: flex; align-items: center;
  }

  .save-error {
    margin: 16px 20px 0; padding: 10px 14px; background: #FBEAE7; color: #B5483D;
    border-radius: 10px; font-size: 12px;
  }

  .action-bar {
    position: fixed; bottom: 0; left: 0; right: 0; padding: 14px 20px 20px;
    background: linear-gradient(to top, #FAF7F2 60%, rgba(250,247,242,0));
  }
  .action-row { display: flex; gap: 10px; max-width: 480px; margin: 0 auto; }
  .btn-expense, .btn-income {
    flex: 1; border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: transform 0.1s ease;
  }
  .btn-expense { background: #1B2430; color: #FAF7F2; border: none; }
  .btn-income { background: white; color: #3A6B52; border: 1.5px solid #3A6B52; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(27,36,48,0.45);
    display: none; align-items: flex-end; justify-content: center; z-index: 50;
  }
  .modal-overlay.show { display: flex; }
  .modal-overlay.center { align-items: center; padding: 20px; }
  .sheet {
    background: #FAF7F2; border-radius: 20px 20px 0 0; padding: 20px 20px 28px;
    width: 100%; max-width: 480px;
  }
  .modal-overlay.center .sheet { border-radius: 18px; padding: 22px; max-width: 340px; }
  .grabber { width: 36px; height: 4px; background: #D8D1C2; border-radius: 999px; margin: 0 auto 18px; }
  .sheet h2 { margin: 0 0 16px; font-size: 17px; font-weight: 700; }
  .modal-overlay.center h2 { margin: 0 0 14px; font-size: 16px; }

  .field-label {
    font-size: 12px; font-weight: 600; color: #8A8378; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .amount-wrap { position: relative; margin-top: 6px; margin-bottom: 14px; }
  .currency-sign {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    font-size: 20px; color: #8A8378;
  }
  .currency-sign.small { font-size: 18px; left: 14px; }
  input[type="number"], input[type="text"], input[type="date"] {
    width: 100%; padding: 12px 14px; font-size: 15px; border: 1.5px solid #D8D1C2;
    border-radius: 12px; background: white; font-family: inherit;
  }
  input[type="number"] { padding-left: 32px; font-size: 20px; }
  .amount-wrap.small input[type="number"] { padding-left: 30px; font-size: 18px; }

  .cat-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; margin-bottom: 14px; }
  .cat-pill {
    padding: 8px 14px; border-radius: 999px; border: 1.5px solid #D8D1C2;
    background: white; color: #1B2430; font-size: 13px; font-weight: 500; cursor: pointer;
  }
  .cat-pill.active { color: white; }

  .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
  .btn-cancel, .btn-save {
    flex: 1; padding: 13px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .btn-cancel { border: 1.5px solid #D8D1C2; background: white; color: #1B2430; }
  .btn-save { border: none; background: #1B2430; color: #FAF7F2; }
  .btn-save:disabled { background: #D8D1C2; cursor: default; }

  .loading { padding: 60px 20px; text-align: center; color: #8A8378; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <h1 class="title">Ledger</h1>
    <span class="month-label mono" id="monthLabel"></span>
  </div>
</div>

<div id="app"></div>

<div class="action-bar">
  <div class="action-row">
    <button class="btn-expense tap" id="openExpense">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Expense
    </button>
    <button class="btn-income tap" id="openIncome">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/></svg>
      Income
    </button>
  </div>
</div>

<!-- Add entry modal -->
<div class="modal-overlay" id="addOverlay">
  <div class="sheet">
    <div class="grabber"></div>
    <h2 id="addTitle">New expense</h2>

    <label class="field-label">Amount</label>
    <div class="amount-wrap">
      <span class="currency-sign mono">$</span>
      <input type="number" inputmode="decimal" id="amountInput" class="mono" placeholder="0.00" />
    </div>

    <div id="categorySection">
      <label class="field-label">Category</label>
      <div class="cat-pills" id="catPills"></div>
    </div>

    <label class="field-label">Note (optional)</label>
    <input type="text" id="noteInput" placeholder="e.g. Chipotle" style="margin-top:6px; margin-bottom:14px;" />

    <label class="field-label">Date</label>
    <input type="date" id="dateInput" style="margin-top:6px; margin-bottom:20px;" />

    <div class="modal-actions">
      <button class="btn-cancel" id="cancelAdd">Cancel</button>
      <button class="btn-save" id="saveAdd" disabled>Save</button>
    </div>
  </div>
</div>

<!-- Budget edit modal -->
<div class="modal-overlay center" id="budgetOverlay">
  <div class="sheet">
    <h2>Monthly budget</h2>
    <div class="amount-wrap small">
      <span class="currency-sign small mono">$</span>
      <input type="number" inputmode="decimal" id="budgetInput" class="mono" style="margin-bottom:18px;" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelBudget">Cancel</button>
      <button class="btn-save" id="saveBudget" style="background:#1B2430;">Save</button>
    </div>
  </div>
</div>

<script>
const CATEGORIES = [
  { id: "food", label: "Food", color: "#B5483D" },
  { id: "transport", label: "Transport", color: "#A87B3F" },
  { id: "rent", label: "Rent", color: "#5B6B8C" },
  { id: "fun", label: "Fun", color: "#7E5BA6" },
  { id: "school", label: "School", color: "#3A6B52" },
  { id: "other", label: "Other", color: "#8A8378" },
];

function catInfo(id) {
  return CATEGORIES.find((c) => c.id === id) || CATEGORIES[5];
}
function todayStr() {
  return new Date().toISOString().slice(0, 10);
}
function monthKey(dateStr) {
  return dateStr.slice(0, 7);
}
function formatMoney(n) {
  const sign = n < 0 ? "-" : "";
  return `${sign}$${Math.abs(n).toFixed(2)}`;
}
function formatDateShort(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}

// ---- Storage (localStorage-backed, since this runs as a standalone page) ----
const STORE_KEY_ENTRIES = "ledger_entries";
const STORE_KEY_BUDGET = "ledger_budget";

function loadEntries() {
  try {
    const raw = localStorage.getItem(STORE_KEY_ENTRIES);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}
function saveEntries(entries) {
  try {
    localStorage.setItem(STORE_KEY_ENTRIES, JSON.stringify(entries));
    return true;
  } catch (e) { return false; }
}
function loadBudget() {
  try {
    const raw = localStorage.getItem(STORE_KEY_BUDGET);
    return raw ? JSON.parse(raw) : 800;
  } catch (e) { return 800; }
}
function saveBudgetVal(b) {
  try {
    localStorage.setItem(STORE_KEY_BUDGET, JSON.stringify(b));
    return true;
  } catch (e) { return false; }
}

let entries = loadEntries();
let budget = loadBudget();
let addType = "expense";
let selectedCategory = "food";

document.getElementById("monthLabel").textContent =
  new Date().toLocaleDateString(undefined, { month: "long", year: "numeric" });

function render() {
  const thisMonth = monthKey(todayStr());
  const monthEntries = entries.filter((e) => monthKey(e.date) === thisMonth);
  const income = monthEntries.filter(e => e.type === "income").reduce((s, e) => s + e.amount, 0);
  const spent = monthEntries.filter(e => e.type === "expense").reduce((s, e) => s + e.amount, 0);

  const map = {};
  monthEntries.filter(e => e.type === "expense").forEach(e => {
    map[e.category] = (map[e.category] || 0) + e.amount;
  });
  const byCategory = CATEGORIES.map(c => ({ ...c, total: map[c.id] || 0 }))
    .filter(c => c.total > 0)
    .sort((a, b) => b.total - a.total);

  const pct = budget > 0 ? Math.min(100, (spent / budget) * 100) : 0;
  const overBudget = spent > budget;
  const remaining = budget - spent;

  const recent = [...entries].sort((a, b) => (a.date < b.date ? 1 : -1)).slice(0, 12);

  let html = `
    <div class="hero-wrap">
      <div class="hero">
        <div class="hero-label">Left to spend this month</div>
        <div class="hero-amount mono ${overBudget ? 'over' : 'under'}">${formatMoney(remaining)}</div>
        <div style="margin-top:16px;">
          <div class="progress-row mono">
            <span>${formatMoney(spent)} spent</span>
            <button class="budget-link" id="editBudgetBtn">of ${formatMoney(budget)} budget</button>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width:${pct}%; background:${overBudget ? '#E08A7D' : '#6FA585'};"></div>
          </div>
        </div>
      </div>

      <div class="strip">
        <div class="strip-card">
          <div class="strip-head" style="color:#3A6B52;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
            <span class="strip-head-label">Income</span>
          </div>
          <div class="strip-amount mono">${formatMoney(income)}</div>
        </div>
        <div class="strip-card">
          <div class="strip-head" style="color:#B5483D;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>
            <span class="strip-head-label">Spent</span>
          </div>
          <div class="strip-amount mono">${formatMoney(spent)}</div>
        </div>
      </div>
    </div>
  `;

  if (byCategory.length > 0) {
    html += `<div class="section"><div class="section-label">By category</div>`;
    byCategory.forEach(c => {
      const catPct = spent > 0 ? (c.total / spent) * 100 : 0;
      html += `
        <div class="cat-row">
          <div class="cat-row-top">
            <span class="cat-name">${c.label}</span>
            <span class="cat-amount mono">${formatMoney(c.total)}</span>
          </div>
          <div class="cat-track">
            <div class="cat-fill" style="width:${catPct}%; background:${c.color};"></div>
          </div>
        </div>
      `;
    });
    html += `</div>`;
  }

  html += `<div class="section"><div class="section-label">Recent activity</div>`;
  if (recent.length === 0) {
    html += `<div class="empty-state">Nothing logged yet. Add your first entry below.</div>`;
  } else {
    html += `<div class="ledger-card">`;
    recent.forEach(e => {
      const cat = catInfo(e.category);
      const isIncome = e.type === "income";
      html += `
        <div class="ledger-row">
          <div class="dot" style="background:${isIncome ? '#3A6B52' : cat.color};"></div>
          <div class="ledger-mid">
            <div class="ledger-note">${escapeHtml(e.note || (isIncome ? "Income" : cat.label))}</div>
            <div class="ledger-sub mono">${formatDateShort(e.date)} · ${isIncome ? "Income" : cat.label}</div>
          </div>
          <div class="ledger-amount mono ${isIncome ? 'income' : ''}">${isIncome ? '+' : '-'}${formatMoney(e.amount).replace('-', '')}</div>
          <button class="del-btn" data-id="${e.id}" aria-label="Delete entry">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      `;
    });
    html += `</div>`;
  }
  html += `</div>`;

  document.getElementById("app").innerHTML = html;

  document.getElementById("editBudgetBtn").addEventListener("click", openBudgetModal);
  document.querySelectorAll(".del-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      entries = entries.filter(e => e.id !== btn.dataset.id);
      const ok = saveEntries(entries);
      if (!ok) showSaveError();
      render();
    });
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

function showSaveError() {
  const existing = document.querySelector(".save-error");
  if (existing) return;
  const div = document.createElement("div");
  div.className = "save-error";
  div.textContent = "Couldn't save changes. Your browser storage may be full or blocked.";
  document.getElementById("app").appendChild(div);
}

// ---- Add modal ----
const addOverlay = document.getElementById("addOverlay");
const amountInput = document.getElementById("amountInput");
const noteInput = document.getElementById("noteInput");
const dateInput = document.getElementById("dateInput");
const categorySection = document.getElementById("categorySection");
const catPills = document.getElementById("catPills");
const saveAddBtn = document.getElementById("saveAdd");
const addTitle = document.getElementById("addTitle");

function buildCatPills() {
  catPills.innerHTML = "";
  CATEGORIES.forEach(c => {
    const pill = document.createElement("button");
    pill.className = "cat-pill" + (selectedCategory === c.id ? " active" : "");
    pill.textContent = c.label;
    pill.style.borderColor = selectedCategory === c.id ? c.color : "#D8D1C2";
    pill.style.background = selectedCategory === c.id ? c.color : "white";
    pill.addEventListener("click", () => {
      selectedCategory = c.id;
      buildCatPills();
    });
    catPills.appendChild(pill);
  });
}

function openAdd(type) {
  addType = type;
  selectedCategory = "food";
  amountInput.value = "";
  noteInput.value = "";
  dateInput.value = todayStr();
  addTitle.textContent = type === "expense" ? "New expense" : "New income";
  categorySection.style.display = type === "expense" ? "block" : "none";
  noteInput.placeholder = type === "expense" ? "e.g. Chipotle" : "e.g. Paycheck";
  buildCatPills();
  saveAddBtn.disabled = true;
  addOverlay.classList.add("show");
  setTimeout(() => amountInput.focus(), 50);
}

document.getElementById("openExpense").addEventListener("click", () => openAdd("expense"));
document.getElementById("openIncome").addEventListener("click", () => openAdd("income"));
document.getElementById("cancelAdd").addEventListener("click", () => addOverlay.classList.remove("show"));
addOverlay.addEventListener("click", (e) => { if (e.target === addOverlay) addOverlay.classList.remove("show"); });

amountInput.addEventListener("input", () => {
  const v = parseFloat(amountInput.value);
  saveAddBtn.disabled = !v || v <= 0;
});

saveAddBtn.addEventListener("click", () => {
  const amt = parseFloat(amountInput.value);
  if (!amt || amt <= 0) return;
  const entry = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    type: addType,
    amount: Math.round(amt * 100) / 100,
    category: addType === "expense" ? selectedCategory : "income",
    note: noteInput.value.trim(),
    date: dateInput.value || todayStr(),
  };
  entries.push(entry);
  const ok = saveEntries(entries);
  if (!ok) showSaveError();
  addOverlay.classList.remove("show");
  render();
});

// ---- Budget modal ----
const budgetOverlay = document.getElementById("budgetOverlay");
const budgetInput = document.getElementById("budgetInput");

function openBudgetModal() {
  budgetInput.value = budget;
  budgetOverlay.classList.add("show");
  setTimeout(() => budgetInput.focus(), 50);
}

document.getElementById("cancelBudget").addEventListener("click", () => budgetOverlay.classList.remove("show"));
budgetOverlay.addEventListener("click", (e) => { if (e.target === budgetOverlay) budgetOverlay.classList.remove("show"); });

document.getElementById("saveBudget").addEventListener("click", () => {
  const b = parseFloat(budgetInput.value);
  if (b >= 0) {
    budget = b;
    const ok = saveBudgetVal(budget);
    if (!ok) showSaveError();
  }
  budgetOverlay.classList.remove("show");
  render();
});

render();
</script>
</body>
</html>
